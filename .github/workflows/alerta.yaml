name: Notificacion DevOps

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar notificación a ntfy
        run: |
          curl -H "Title: GitHub Actions" \
               -H "Priority: default" \
               -d "Se realizó un push al repositorio en la rama main." \
               https://ntfy.sh/devops-itla